<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wardrobe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F4F0;
    --surface: #FAFAF7;
    --border: #E2E0D8;
    --text: #1A1916;
    --muted: #8C8A83;
    --accent: #1A1916;
    --nav-w: 148px;
    --card-gap: 2px;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
    overflow: hidden;
  }

  /* NAV */
  nav {
    width: var(--nav-w);
    min-height: 100vh;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 32px 0;
    flex-shrink: 0;
    background: var(--surface);
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
  }

  .nav-logo {
    font-family: 'EB Garamond', Georgia, serif;
    font-style: italic;
    font-size: 15px;
    color: var(--text);
    padding: 0 20px 28px;
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.01em;
  }

  .nav-section {
    padding: 20px 0 0;
  }

  .nav-label {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 20px 10px;
    display: block;
  }

  nav a {
    display: block;
    padding: 7px 20px;
    font-size: 12px;
    letter-spacing: 0.04em;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.15s;
    cursor: pointer;
  }

  nav a:hover { color: var(--text); }
  nav a.active { color: var(--text); }

  .nav-count {
    float: right;
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
  }

  /* MAIN */
  main {
    margin-left: var(--nav-w);
    flex: 1;
    height: 100vh;
    overflow-y: auto;
    padding: 32px;
  }

  .page-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .page-title {
    font-family: 'EB Garamond', Georgia, serif;
    font-style: italic;
    font-size: 26px;
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  .page-meta {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  /* STATUS */
  .status-bar {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 20px;
    height: 20px;
    letter-spacing: 0.03em;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: var(--card-gap);
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    position: relative;
    cursor: pointer;
    overflow: hidden;
  }

  .card-img-wrap {
    aspect-ratio: 3/4;
    overflow: hidden;
    background: #ECEAE4;
    position: relative;
  }

  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.5s ease;
  }

  .card:hover .card-img-wrap img { transform: scale(1.03); }

  .card-img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .card-body {
    padding: 10px 12px 12px;
    border-top: 1px solid var(--border);
  }

  .card-brand {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .card-name {
    font-size: 12px;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-price { font-size: 11px; color: var(--muted); display: flex; align-items: baseline; gap: 5px; }
  .card-price.on-sale .sale-price { color: #9B3A2A; }
  .card-price .original-price { text-decoration: line-through; color: var(--muted); font-size: 10px; }

  /* CARD ACTIONS */
  .card-actions {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover .card-actions { opacity: 1; }

  .card-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: rgba(245,244,240,0.92);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s, transform 0.15s;
    backdrop-filter: blur(4px);
  }

  .card-btn:hover { background: var(--surface); transform: scale(1.08); }
  .card-btn.saved { background: var(--text); color: var(--bg); }

  /* LOADING / EMPTY */
  .loading-state {
    grid-column: 1/-1;
    padding: 60px 0;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .empty-state {
    grid-column: 1/-1;
    padding: 60px 0;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  /* BRANDS PAGE */
  .brands-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 2px;
  }

  .brand-row {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand-name-text {
    font-size: 13px;
    letter-spacing: 0.02em;
  }

  .brand-meta {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-top: 2px;
  }

  .brand-badge {
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .brand-badge.live { border-color: #B8D4B0; color: #4A7A42; background: #F2F8F1; }
  .brand-badge.all { border-color: #D4C8A0; color: #7A6A30; background: #FAF6E8; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--text);
    color: var(--bg);
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 8px 18px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 999;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* SCROLLBAR */
  main::-webkit-scrollbar { width: 4px; }
  main::-webkit-scrollbar-track { background: transparent; }
  main::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">funnelcake</div>

  <div class="nav-section">
    <span class="nav-label">Browse</span>
    <a href="#" data-view="all" class="active">All</a>
    <a href="#" data-view="tops">Tops</a>
    <a href="#" data-view="dresses">Dresses</a>
    <a href="#" data-view="bottoms">Bottoms</a>
    <a href="#" data-view="outerwear">Outerwear</a>
    <a href="#" data-view="shoes">Shoes</a>
    <a href="#" data-view="accessories">Accessories</a>
    <a href="#" data-view="home">Home</a>
    <a href="#" data-view="other">Other</a>
  </div>

  <div class="nav-section">
    <span class="nav-label">Library</span>
    <a href="#" data-view="saved">Saved <span class="nav-count" id="saved-count"></span></a>
    <a href="#" data-view="brands">Brands</a>
  </div>
</nav>

<main id="main">
  <div class="page-header">
    <h1 class="page-title" id="page-title">All</h1>
    <span class="page-meta" id="page-meta"></span>
  </div>
  <div class="status-bar" id="status-bar">Loading...</div>
  <div class="grid" id="grid"></div>
</main>

<div class="toast" id="toast"></div>

<script>
const USER_SIZE = 'M';
const USER_SHOE_SIZE = '7';
const USER_TOPS_NUMERIC = ['6', '8'];
const USER_BOTTOMS_NUMERIC = ['29'];
const MENS_KEYWORDS = ['mens', "men's", ' men ', 'menswear', 'man ', 'for men'];

const BRANDS = [
  { id: 'imogene',   name: 'Imogene + Willie', url: 'https://imogeneandwillie.com',  feed: true  },
  { id: 'staud',     name: 'STAUD',            url: 'https://staud.clothing',        feed: true  },
  { id: 'cultgaia',  name: 'Cult Gaia',        url: 'https://cultgaia.com',          feed: true  },
  { id: 'byfar',     name: 'By Far',           url: 'https://byfar.com',             feed: true  },
  { id: 'loeffler',  name: 'Loeffler Randall',  url: 'https://www.loefflerrandall.com', feed: true        },
  { id: 'heath',     name: 'Heath Ceramics',    url: 'https://www.heathceramics.com',   feed: true, home: true },
  { id: 'bfgf',      name: 'BFGF',             url: 'https://www.bfgf-shop.com',       feed: false, home: true },
  { id: 'cos',       name: 'COS',              url: 'https://www.cos.com',             feed: false },
  { id: 'kooples',   name: 'The Kooples',      url: 'https://www.thekooples.com',    feed: false },
  { id: 'vince',     name: 'Vince',            url: 'https://www.vince.com',         feed: false },
  { id: 'maje',      name: 'Maje',             url: 'https://us.maje.com',           feed: false },
];

const CATEGORY_MAP = {
  tops:        ['shirt','shirts','top','tops','tee','tees','t-shirt','polo','knit','sweater','sweatshirt','hoodie','jersey','henley','flannel','button','woven','crew','blouse','tank','camisole','bodysuit'],
  bottoms:     ['pant','pants','trouser','trousers','short','shorts','jean','jeans','denim','chino','chinos','jogger','skirt','legging','leggings'],
  dresses:     ['dress','dresses','gown','jumpsuit','romper','overall','overalls','midi','maxi','mini dress'],
  outerwear:   ['jacket','coat','blazer','overshirt','parka','anorak','windbreaker','vest','fleece','bomber','outerwear','cardigan','trench'],
  shoes:       ['shoe','shoes','sneaker','sneakers','boot','boots','loafer','loafers','sandal','sandals','slipper','footwear','trainer','heel','heels','mule','flat','flats','pump'],
  accessories: ['hat','cap','bag','tote','wallet','belt','scarf','beanie','glove','sock','socks','sunglasses','watch','accessory','accessories','keychain','bottle','jewelry','necklace','earring','bracelet','purse'],
  home:        ['mug','cup','bowl','plate','platter','vase','pitcher','carafe','teapot','candle','ceramic','pottery','linen','throw','blanket','pillow','cushion','tray','cutting board','knife','glass','tumbler','decor','frame','basket','towel','napkin','tablecloth','placemat','lamp','shade','storage','jar','crock','pan','dish'],
};

function guessCategory(title, type) {
  const text = ((title || '') + ' ' + (type || '')).toLowerCase();
  for (const [cat, keywords] of Object.entries(CATEGORY_MAP)) {
    if (keywords.some(k => text.includes(k))) return cat;
  }
  return 'other';
}

function formatPrice(price) {
  if (!price) return '';
  const n = parseFloat(price);
  return isNaN(n) ? price : '$' + n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

let allProducts = [];
let savedIds = new Set(JSON.parse(localStorage.getItem('saved') || '[]'));
let hiddenIds = new Set(JSON.parse(localStorage.getItem('hidden') || '[]'));
let currentView = 'all';

function savePersist() {
  localStorage.setItem('saved', JSON.stringify([...savedIds]));
  localStorage.setItem('hidden', JSON.stringify([...hiddenIds]));
  document.getElementById('saved-count').textContent = savedIds.size > 0 ? savedIds.size : '';
}

function hiRes(src) {
  if (!src) return '';
  // Remove any existing Shopify size suffix (e.g. _800x, _600x600, _master) then add _1200x
  return src
    .replace(/_(pico|icon|thumb|small|compact|medium|large|grande|original|master|\d+x\d*|\d*x\d+)(crop_\w+)?(\.[a-z]+)(\?.*)?$/i, '$3$4')
    .replace(/(\.[a-z]+)(\?.*)?$/i, '_1200x$1$2');
}

async function fetchBrand(brand) {
  const endpoint = `${brand.url}/products.json?limit=250`;
  const CORS = `https://corsproxy.io/?url=${encodeURIComponent(endpoint)}`;
  try {
    const res = await fetch(CORS, { headers: { 'x-requested-with': 'XMLHttpRequest' } });
    if (!res.ok) throw new Error('non-200');
    const data = await res.json();
    const products = [];
    for (const p of (data.products || [])) {
      const productText = ((p.title || '') + ' ' + (p.product_type || '') + ' ' + (p.tags || []).join(' ')).toLowerCase();

      // Home brands: skip gender/size filters, just show in-stock items
      if (brand.home) {
        const inStock = p.variants?.some(v => v.available);
        if (!inStock) continue;
        const variant = p.variants?.find(v => v.available) || p.variants?.[0];
        const onSale = variant?.compare_at_price && parseFloat(variant.compare_at_price) > parseFloat(variant.price);
        const category = guessCategory(p.title, p.product_type) === 'other' ? 'home' : guessCategory(p.title, p.product_type);
        products.push({
          id: `${brand.id}-${p.id}`,
          brand: brand.name, brandId: brand.id,
          name: p.title, price: formatPrice(variant?.price),
          originalPrice: onSale ? formatPrice(variant.compare_at_price) : null,
          image: hiRes(p.images?.[0]?.src),
          link: `${brand.url}/products/${p.handle}`,
          category: 'home', sizeFiltered: false, onSale,
        });
        continue;
      }

      // Gender filter: skip anything that looks men's-specific
      if (MENS_KEYWORDS.some(w => productText.includes(w))) continue;
      if (productText.includes('linen')) continue;

      const inStock = p.variants?.some(v => v.available);
      if (!inStock) continue;

      const category = guessCategory(p.title, p.product_type);

      // Accessories: include all sizes, just needs to be in stock
      if (category === 'accessories') {
        const variant = p.variants?.find(v => v.available) || p.variants?.[0];
        const onSale = variant?.compare_at_price && parseFloat(variant.compare_at_price) > parseFloat(variant.price);
        products.push({
          id: `${brand.id}-${p.id}`,
          brand: brand.name, brandId: brand.id,
          name: p.title, price: formatPrice(variant?.price),
          originalPrice: onSale ? formatPrice(variant.compare_at_price) : null,
          image: hiRes(p.images?.[0]?.src),
          link: `${brand.url}/products/${p.handle}`,
          category, sizeFiltered: false, onSale,
        });
        continue;
      }

      // Shoes: match on shoe size number
      if (category === 'shoes') {
        const shoeMatch = p.variants?.some(v => {
          const t = (v.title || '').replace(/[^0-9.]/g, '');
          return t === USER_SHOE_SIZE && v.available;
        });
        if (!shoeMatch) continue;
        const variant = p.variants?.find(v => v.available && (v.title || '').replace(/[^0-9.]/g, '') === USER_SHOE_SIZE) || p.variants?.[0];
        const onSale = variant?.compare_at_price && parseFloat(variant.compare_at_price) > parseFloat(variant.price);
        products.push({
          id: `${brand.id}-${p.id}`,
          brand: brand.name, brandId: brand.id,
          name: p.title, price: formatPrice(variant?.price),
          originalPrice: onSale ? formatPrice(variant.compare_at_price) : null,
          image: hiRes(p.images?.[0]?.src),
          link: `${brand.url}/products/${p.handle}`,
          category, sizeFiltered: true, onSale,
        });
        continue;
      }

      // High rise filter for bottoms
      if (category === 'bottoms' && productText.includes('high rise')) continue;

      // Apparel: match on USER_SIZE plus numeric sizes per category
      const extraSizes = category === 'tops' ? USER_TOPS_NUMERIC
                       : category === 'bottoms' ? USER_BOTTOMS_NUMERIC
                       : [];

      function sizeMatches(variantTitle) {
        const t = variantTitle.toUpperCase();
        const tRaw = variantTitle.trim();
        if ((t === USER_SIZE || t.includes(`/ ${USER_SIZE}`) || t.startsWith(`${USER_SIZE} /`) || t.startsWith(`${USER_SIZE}/`))) return true;
        if (extraSizes.some(s => tRaw === s || t.includes(`/ ${s}`) || t.startsWith(`${s} /`) || t.startsWith(`${s}/`) || t === s.toUpperCase())) return true;
        return false;
      }

      const sizeMatch = p.variants?.some(v => sizeMatches(v.title || '') && v.available);
      if (!sizeMatch) continue;
      const variant = p.variants?.find(v => sizeMatches(v.title || '') && v.available) || p.variants?.[0];
      const onSale = variant?.compare_at_price && parseFloat(variant.compare_at_price) > parseFloat(variant.price);
      products.push({
        id: `${brand.id}-${p.id}`,
        brand: brand.name, brandId: brand.id,
        name: p.title, price: formatPrice(variant?.price),
        originalPrice: onSale ? formatPrice(variant.compare_at_price) : null,
        image: hiRes(p.images?.[0]?.src),
        link: `${brand.url}/products/${p.handle}`,
        category, sizeFiltered: true, onSale,
      });
    }
    return products;
  } catch(e) {
    console.warn(`Failed to fetch ${brand.name}:`, e);
    return [];
  }
}

async function loadAll() {
  document.getElementById('status-bar').textContent = 'Fetching products…';
  const feedBrands = BRANDS.filter(b => b.feed);
  const results = await Promise.allSettled(feedBrands.map(fetchBrand));
  allProducts = results.flatMap(r => r.status === 'fulfilled' ? r.value : []);
  document.getElementById('status-bar').textContent = `${allProducts.length} items in size ${USER_SIZE}`;
  savePersist();
  render();
}

function getFilteredProducts(view) {
  if (view === 'saved') return allProducts.filter(p => savedIds.has(p.id));
  if (view === 'all') return allProducts.filter(p => !hiddenIds.has(p.id));
  if (view === 'other') return allProducts.filter(p => !hiddenIds.has(p.id) && p.category === 'other');
  return allProducts.filter(p => !hiddenIds.has(p.id) && p.category === view);
}

function render() {
  const grid = document.getElementById('grid');
  const title = document.getElementById('page-title');
  const meta = document.getElementById('page-meta');

  if (currentView === 'brands') {
    renderBrands();
    return;
  }

  const products = getFilteredProducts(currentView);
  const label = currentView === 'all' ? 'All' : currentView.charAt(0).toUpperCase() + currentView.slice(1);
  title.textContent = label;
  meta.textContent = products.length + ' items';

  if (products.length === 0) {
    grid.innerHTML = `<div class="empty-state">Nothing here</div>`;
    return;
  }

  grid.innerHTML = products.map(p => {
    const isSaved = savedIds.has(p.id);
    return `
    <div class="card" data-id="${p.id}" onclick="openLink('${p.link}')" style="cursor:pointer;">
      <div class="card-img-wrap">
        ${p.image
          ? `<img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=card-img-placeholder>${p.brand}</div>'">`
          : `<div class="card-img-placeholder">${p.brand}</div>`}
        <div class="card-actions">
          <button class="card-btn save-btn ${isSaved ? 'saved' : ''}" data-id="${p.id}" title="Save">♥</button>
          <button class="card-btn hide-btn" data-id="${p.id}" title="Hide">×</button>
        </div>
      </div>
      <div class="card-body">
        <div class="card-brand">${p.brand}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-price ${p.onSale ? 'on-sale' : ''}">
          <span class="${p.onSale ? 'sale-price' : ''}">${p.price}</span>
          ${p.onSale ? `<span class="original-price">${p.originalPrice}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.save-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.id;
      if (savedIds.has(id)) { savedIds.delete(id); showToast('Removed'); }
      else { savedIds.add(id); showToast('Saved'); }
      savePersist();
      render();
    });
  });

  grid.querySelectorAll('.hide-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.id;
      hiddenIds.add(id);
      savedIds.delete(id);
      savePersist();
      render();
    });
  });
}

function renderBrands() {
  const main = document.getElementById('main');
  document.getElementById('page-title').textContent = 'Brands';
  document.getElementById('page-meta').textContent = BRANDS.length + ' brands';
  document.getElementById('status-bar').textContent = '';

  const grid = document.getElementById('grid');
  grid.className = 'brands-list';
  grid.innerHTML = BRANDS.map(b => {
    const count = allProducts.filter(p => p.brandId === b.id).length;
    const badge = b.feed
      ? `<span class="brand-badge live">Live · Size ${USER_SIZE}</span>`
      : `<span class="brand-badge all">All sizes</span>`;
    return `
    <div class="brand-row">
      <div>
        <div class="brand-name-text">${b.name}</div>
        <div class="brand-meta">${count > 0 ? count + ' items' : 'No items loaded'}</div>
      </div>
      ${badge}
    </div>`;
  }).join('');
}

function openLink(url) {
  window.open(url, '_blank', 'noopener');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1600);
}

document.querySelectorAll('nav a').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    currentView = a.dataset.view;
    document.getElementById('grid').className = 'grid';
    render();
    document.getElementById('main').scrollTo(0, 0);
  });
});

savePersist();
